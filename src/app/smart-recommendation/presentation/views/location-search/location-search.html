<div class="location-search-page">

  <div class="location-search-card">

    <h1 class="location-search-title">{{ 'recommendations.location_search_title' | translate }}</h1>
    <p class="location-search-subtitle">{{ 'recommendations.location_search_subtitle' | translate }}</p>

    <div class="location-search-input-row">
      <div class="location-search-input-wrapper">
        <input
          class="location-search-input"
          type="text"
          autocomplete="off"
          [value]="citySearchQuery()"
          [placeholder]="(citiesLoading() ? 'recommendations.location_search_loading' : 'recommendations.location_search_placeholder') | translate"
          (input)="onCityInput($event)"
          (focus)="showSuggestions.set(true)"
          (blur)="onInputBlur()"
          (keyup.enter)="confirm()" />
        @if (showSuggestions() && suggestions().length > 0) {
          <ul class="city-suggestions" role="listbox">
            @for (s of suggestions(); track s.city + s.country) {
              <li
                class="city-suggestion-item"
                role="option"
                (mousedown)="selectSuggestion(s.city, s.country)"
              >{{ s.city }}, {{ s.country }}</li>
            }
          </ul>
        }
      </div>
      <button
        class="btn btn--primary"
        [disabled]="!canConfirm || store.loading()"
        (click)="confirm()">
        {{ 'recommendations.location_search_confirm' | translate }}
      </button>
    </div>

    <button class="btn btn--ghost" (click)="goBack()">
      {{ 'recommendations.location_search_back' | translate }}
    </button>

  </div>

</div>
