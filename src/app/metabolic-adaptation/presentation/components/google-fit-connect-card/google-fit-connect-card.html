<div class="connect-card">
  <div class="connect-card-icon" aria-hidden="true">
    <span class="material-icons">watch</span>
  </div>
  <h3 class="connect-card-title">{{ 'physical_activity.google_fit.title' | translate }}</h3>
  <p class="connect-card-desc">{{ 'physical_activity.google_fit.desc' | translate }}</p>
  <button
    class="btn btn--primary btn--full"
    type="button"
    (click)="onConnect()">
    {{ 'physical_activity.google_fit.connect_btn' | translate }}
  </button>
</div>
