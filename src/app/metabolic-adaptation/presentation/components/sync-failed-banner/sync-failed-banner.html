<div class="sync-failed-banner" role="alert">
  <div class="sync-failed-top">
    <div class="sync-failed-status">
      <span class="material-icons sync-failed-icon">sync_problem</span>
      <span class="sync-failed-label">{{ 'physical_activity.sync_failed.badge' | translate }}</span>
    </div>
    <div class="sync-failed-actions">
      <span class="sync-failed-time">
        {{ 'physical_activity.sync_failed.last_success' | translate }}
        {{ hoursSinceSync() }}h ago
      </span>
      <button class="btn btn--primary btn--sm" type="button"
              [disabled]="isLoading()"
              (click)="onRetry()">
        {{ 'physical_activity.sync_failed.retry_btn' | translate }}
      </button>
      <button class="link-btn link-btn--danger" type="button"
              (click)="onDisconnect()">
        {{ 'physical_activity.connected.disconnect' | translate }}
      </button>
    </div>
  </div>
  <p class="sync-failed-desc">{{ 'physical_activity.sync_failed.desc' | translate }}</p>
</div>
