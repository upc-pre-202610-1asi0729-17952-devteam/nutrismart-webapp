<div class="export-pdf-overlay" [class.visible]="isVisible">
  <div class="export-pdf-modal">
    <h2 class="modal-title">Export PDF Report</h2>

    <div class="date-selection">
      <mat-form-field appearance="fill">
        <mat-label>From Date</mat-label>
        <input matInput [matDatepicker]="fromPicker" [(ngModel)]="fromDate">
        <mat-datepicker-toggle matSuffix [for]="fromPicker"></mat-datepicker-toggle>
        <mat-datepicker #fromPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>To Date</mat-label>
        <input matInput [matDatepicker]="toPicker" [(ngModel)]="toDate">
        <mat-datepicker-toggle matSuffix [for]="toPicker"></mat-datepicker-toggle>
        <mat-datepicker #toPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <div class="report-options">
      <h3>Include in report:</h3>
      @for (option of reportOptions; track option.label) {
        <div class="option-item">
          <input type="checkbox" [(ngModel)]="option.selected" [id]="option.label | lowercase | replace:' ':'-'">
          <label [for]="option.label | lowercase | replace:' ':'-'">{{ option.label }}</label>
        </div>
      }
    </div>

    <div class="modal-actions">
      <button type="button" class="cancel-button" (click)="onCancel()">Cancel</button>
      <button
        type="button"
        class="generate-button"
        [disabled]="isGenerateButtonDisabled"
        (click)="onGeneratePdf()">
        @if (analyticsStore.loading()) {
          <span class="spinner"></span>
        } @else {
          Generate PDF
        }
      </button>
    </div>

    @if (analyticsStore.error()) {
      <div class="error-message">{{ analyticsStore.error() }}</div>
    }
  </div>
</div>
