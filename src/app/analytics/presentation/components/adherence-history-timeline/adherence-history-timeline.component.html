<div class="adherence-history-timeline">
  <h3 class="panel-title" aria-label="Adherence History Timeline">Monthly adherence</h3>

  @if (timelineEntries.length > 0) {
    <div class="timeline-container">
      @for (entry of timelineEntries; track $index) {
        <div class="timeline-entry">
          <div class="timeline-dot" [ngClass]="entry.statusClass" [title]="entry.tooltip" aria-label="Adherence status on {{ entry.date }}: {{ entry.tooltip }}"></div>
          <small class="timeline-date" aria-hidden="true">{{ entry.date }}</small>
        </div>
      }
    </div>
  } @else {
    <div class="no-data-message">No adherence history available for this period.</div>
  }
</div>
