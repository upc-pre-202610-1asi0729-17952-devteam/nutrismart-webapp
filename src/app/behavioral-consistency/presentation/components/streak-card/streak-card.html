<div class="streak-card" [class.warning-border]="hasMisses()">
  <div class="streak-header">
    <div class="streak-icon">🔥</div>
    <div class="streak-count">
      <span class="number">{{ streak() }}</span>
      <span class="label">Días de racha</span>
    </div>
  </div>

  <div class="streak-footer">
    <p class="message">{{ streakMessage() }}</p>

    @if (hasMisses()) {
      <div class="misses-badge">
        {{ consecutiveMisses() }} {{ consecutiveMisses() === 1 ? 'día perdido' : 'días perdidos' }}
      </div>
    }
  </div>
</div>
