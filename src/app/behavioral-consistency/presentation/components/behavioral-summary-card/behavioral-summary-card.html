<div class="summary-card" [ngClass]="rateVariant()">
  <div class="card-header">
    <span class="card-title">{{ 'behavioral.summary_card.title' | translate }}</span>
    <span class="status-indicator"></span>
  </div>

  <div class="card-body">
    <div class="rate-container">
      <div class="circular-progress">
        <svg viewBox="0 0 36 36" class="circular-chart">
          <path class="circle-bg"
                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
          />
          <path class="circle"
                [style.stroke-dasharray]="weeklyCompletionRate() + ', 100'"
                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
          />
          <text x="18" y="20.35" class="percentage">{{ weeklyCompletionRate() }}%</text>
        </svg>
      </div>
      <div class="rate-info">
        <span class="rate-label">{{ progressLabelKey() | translate }}</span>
        <span class="days-count">
          {{ 'behavioral.summary_card.days_completed' | translate: { completed: completedDaysThisWeek() } }}
        </span>
      </div>
    </div>

    <p class="summary-text">{{ summary() }}</p>
  </div>
</div>
